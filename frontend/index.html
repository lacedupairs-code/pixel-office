<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Office - OpenClaw Agents</title>
    <link rel="stylesheet" href="css/office.css">
</head>
<body>
    <div id="game-container"></div>
    
    <!-- Agent info overlay -->
    <div id="agent-info" class="hidden">
        <h2 id="agent-name">Agent Name</h2>
        <p id="agent-state">State: Idle</p>
        <p id="agent-task">Task: None</p>
        <button onclick="closeAgentInfo()">Close</button>
    </div>
    
    <!-- Status bar -->
    <div id="status-bar">
        <span id="connection-status">🟡 Connecting...</span>
        <span id="timestamp"></span>
    </div>

    <!-- Phaser.js (will be replaced with local file in production) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <script src="js/office.js"></script>
</body>
</html>
